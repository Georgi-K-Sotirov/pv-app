<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PV Калкулатор</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#2e7d32">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #efefef;
      margin: 0;
      padding: 12px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      padding: 16px;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h2 {
      margin: 0 0 14px 0;
      font-size: 28px;
    }

    h3 {
      margin: 18px 0 10px;
      font-size: 18px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
      font-size: 15px;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      font-size: 17px;
      border: 1px solid #999;
      border-radius: 6px;
      background: white;
    }

    input:disabled {
      background: #f0f0f0;
      color: #666;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      font-size: 22px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .info {
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }

    .result {
      margin-top: 18px;
      background: #f7f7f7;
      border-radius: 10px;
      padding: 14px;
      min-height: 180px;
      font-size: 17px;
      line-height: 1.45;
    }

    .card {
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      border: 2px solid #ddd;
      background: white;
    }

    .good {
      border-color: #2e7d32;
      background: #edf8ee;
    }

    .bad {
      border-color: #c62828;
      background: #fdeeee;
    }

    .neutral {
      border-color: #999;
      background: #fafafa;
    }

    .title-row {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .metric {
      margin: 4px 0;
    }

    .recommendation {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #e8f5e9;
      border: 2px solid #2e7d32;
      font-size: 17px;
      line-height: 1.45;
    }

    .small {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>PV Калкулатор</h2>

    <h3>1) Покрив</h3>

    <label for="area">Площ (m²)</label>
    <input id="area" value="35">

    <label for="factor">Използваемост</label>
    <input id="factor" value="0.75">

    <label for="density">Плътност (kWp/m²)</label>
    <input id="density" value="0.21">
    <div class="small">Пример: 0.18 – 0.22</div>

    <h3>2) Цени по категории</h3>

    <label for="price_small">Цена до 15 kWp (€/kWp)</label>
    <input id="price_small" value="1500">

    <label for="price_medium">Цена до 50 kWp (€/kWp)</label>
    <input id="price_medium" value="1100">

    <label for="price_large">Цена над 50 kWp (€/kWp)</label>
    <input id="price_large" value="950">

    <h3>3) Батерия</h3>

    <label for="battery_price">Цена батерия (€)</label>
    <input id="battery_price" value="5000">

    <h3>4) Консумация</h3>

    <label for="object_type">Тип обект</label>
    <select id="object_type" onchange="updateObjectType()">
      <option value="household">Битов</option>
      <option value="industrial">Промишлен</option>
    </select>

    <label for="price_kwh">Цена ток (€/kWh)</label>
    <input id="price_kwh" value="0.13">

    <label for="specific_yield">Специфично производство (kWh/kWp/год.)</label>
    <input id="specific_yield" value="1350">

    <label for="self_use_no_battery">Самопотребление без батерия (%)</label>
    <input id="self_use_no_battery" value="45">

    <label for="self_use_with_battery">Самопотребление с батерия (%)</label>
    <input id="self_use_with_battery" value="75">

    <button type="button" onclick="calc()">Смятай</button>

    <p class="info" id="info"></p>
    <div class="result" id="result">Натисни „Смятай“.</div>
  </div>

  <script>
    function updateObjectType() {
      const objectType = document.getElementById("object_type").value;
      const priceKwh = document.getElementById("price_kwh");

      if (objectType === "household") {
        priceKwh.value = "0.13";
        priceKwh.disabled = true;
      } else {
        priceKwh.value = "0.22";
        priceKwh.disabled = false;
      }
    }

    function eur(v) {
      return `${v.toFixed(0)} €`;
    }

    function years(v) {
      return `${v.toFixed(1)} години`;
    }

    function calc() {
      const area = parseFloat(document.getElementById("area").value) || 0;
      const factor = parseFloat(document.getElementById("factor").value) || 0;
      const density = parseFloat(document.getElementById("density").value) || 0;

      const priceSmall = parseFloat(document.getElementById("price_small").value) || 0;
      const priceMedium = parseFloat(document.getElementById("price_medium").value) || 0;
      const priceLarge = parseFloat(document.getElementById("price_large").value) || 0;

      const batteryPrice = parseFloat(document.getElementById("battery_price").value) || 0;

      const objectType = document.getElementById("object_type").value;
      const priceKwh = parseFloat(document.getElementById("price_kwh").value) || 0;
      const specificYield = parseFloat(document.getElementById("specific_yield").value) || 0;
      const selfUseNoBattery = parseFloat(document.getElementById("self_use_no_battery").value) || 0;
      const selfUseWithBattery = parseFloat(document.getElementById("self_use_with_battery").value) || 0;

      const kwp = area * factor * density;

      let category = "";
      let pricePerKwp = 0;

      if (kwp <= 15) {
        category = "Малка система";
        pricePerKwp = priceSmall;
      } else if (kwp <= 50) {
        category = "Средна система";
        pricePerKwp = priceMedium;
      } else {
        category = "Голяма система";
        pricePerKwp = priceLarge;
      }

      const basePrice = kwp * pricePerKwp;
      const yearlyProduction = kwp * specificYield;

      const usedNoBat = yearlyProduction * (selfUseNoBattery / 100);
      const savingsNoBat = usedNoBat * priceKwh;
      const paybackNoBat = savingsNoBat > 0 ? basePrice / savingsNoBat : 0;
      const profit25NoBat = (savingsNoBat * 25) - basePrice;

      const totalWithBat = basePrice + batteryPrice;
      const usedWithBat = yearlyProduction * (selfUseWithBattery / 100);
      const savingsWithBat = usedWithBat * priceKwh;
      const paybackWithBat = savingsWithBat > 0 ? totalWithBat / savingsWithBat : 0;
      const profit25WithBat = (savingsWithBat * 25) - totalWithBat;

      let recommended = "";
      if (paybackNoBat + 3 < paybackWithBat) {
        recommended = "Препоръчано решение: БЕЗ батерия – по-добра възвръщаемост.";
      } else if (profit25WithBat > profit25NoBat && paybackWithBat <= paybackNoBat + 3) {
        recommended = "Препоръчано решение: С батерия – по-висока дългосрочна печалба и по-добро самопотребление.";
      } else {
        recommended = "Препоръчано решение: БЕЗ батерия – по-балансиран вариант към момента.";
      }

      const noBatBetter = paybackNoBat <= paybackWithBat;
      const withBatBetter = !noBatBetter;

      document.getElementById("info").innerText =
        `Тип обект: ${objectType === "household" ? "Битов" : "Промишлен"} | Категория: ${category} | Цена на тока: ${priceKwh.toFixed(2)} €/kWh`;

      document.getElementById("result").innerHTML = `
        <div class="metric"><strong>Мощност:</strong> ${kwp.toFixed(2)} kWp</div>
        <div class="metric"><strong>Цена на категория:</strong> ${pricePerKwp.toFixed(0)} €/kWp</div>
        <div class="metric"><strong>Базова цена на системата:</strong> ${eur(basePrice)}</div>
        <div class="metric"><strong>Годишно производство:</strong> ${yearlyProduction.toFixed(0)} kWh</div>

        <div class="card ${noBatBetter ? 'good' : 'bad'}">
          <div class="title-row">❌ Без батерия</div>
          <div class="metric"><strong>Цена:</strong> ${eur(basePrice)}</div>
          <div class="metric"><strong>Самопотребление:</strong> ${selfUseNoBattery.toFixed(0)} %</div>
          <div class="metric"><strong>Оползотворена енергия:</strong> ${usedNoBat.toFixed(0)} kWh</div>
          <div class="metric"><strong>Годишна икономия:</strong> ${eur(savingsNoBat)}</div>
          <div class="metric"><strong>Възвръщаемост:</strong> ${years(paybackNoBat)}</div>
          <div class="metric"><strong>Печалба за 25 години:</strong> ${eur(profit25NoBat)}</div>
        </div>

        <div class="card ${withBatBetter ? 'good' : 'bad'}">
          <div class="title-row">🔋 С батерия</div>
          <div class="metric"><strong>Цена:</strong> ${eur(totalWithBat)}</div>
          <div class="metric"><strong>Самопотребление:</strong> ${selfUseWithBattery.toFixed(0)} %</div>
          <div class="metric"><strong>Оползотворена енергия:</strong> ${usedWithBat.toFixed(0)} kWh</div>
          <div class="metric"><strong>Годишна икономия:</strong> ${eur(savingsWithBat)}</div>
          <div class="metric"><strong>Възвръщаемост:</strong> ${years(paybackWithBat)}</div>
          <div class="metric"><strong>Печалба за 25 години:</strong> ${eur(profit25WithBat)}</div>
        </div>

        <div class="recommendation">
          <strong>${recommended}</strong>
        </div>
      `;
    }

    updateObjectType();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PV Калкулатор</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#2e7d32">

<style>
body {font-family: Arial; background:#efefef; padding:12px;}
.container {max-width:600px;margin:auto;background:white;padding:16px;border-radius:12px;}

input, select {
width:100%;
padding:12px;
margin:6px 0 12px;
font-size:16px;
}

button {
width:100%;
padding:14px;
font-size:20px;
margin-top:10px;
border:none;
border-radius:10px;
color:white;
background:#2e7d32;
}

.blue {background:#1565c0;}

.card {
border:2px solid #ccc;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.good {border-color:green;background:#eef8ee;}
.bad {border-color:red;background:#fdeeee;}

.result {margin-top:15px;font-size:16px;}

</style>
</head>

<body>

<div class="container">

<h2>PV Калкулатор</h2>

<h3>Данни за оферта</h3>
<input id="client_name" placeholder="Клиент">
<input id="project_name" placeholder="Обект">
<input id="attention_name" placeholder="На вниманието на: г-н Иван Иванов">

<h3>Покрив</h3>
<input id="area" value="35">
<input id="factor" value="0.75">
<input id="density" value="0.21">

<h3>Цени</h3>
<input id="price_small" value="1500">
<input id="price_medium" value="1100">
<input id="price_large" value="950">

<h3>Батерия</h3>
<input id="battery_price" value="5000">

<h3>Тип обект</h3>
<select id="object_type" onchange="updateObjectType()">
<option value="household">Битов</option>
<option value="industrial">Промишлен</option>
</select>

<input id="price_kwh" value="0.13">

<input id="specific_yield" value="1350">
<input id="self_use_no_battery" value="45">
<input id="self_use_with_battery" value="75">
<input id="energy_growth" value="3">

<button onclick="calc()">Смятай</button>
<button class="blue" onclick="generatePDF()">PDF оферта</button>

<div id="result" class="result"></div>

</div>

<script>

function updateObjectType(){
let type = object_type.value;
if(type==="household"){
price_kwh.value=0.13;
price_kwh.disabled=true;
}else{
price_kwh.value=0.22;
price_kwh.disabled=false;
}
}

function dynamicPayback(cost, saving, growth){
let cum=0;
let yearly=saving;
for(let y=1;y<=50;y++){
cum+=yearly;
if(cum>=cost) return y;
yearly*=1+(growth/100);
}
return 50;
}

function getData(){

let kwp = area.value * factor.value * density.value;

let price = kwp<=15?price_small.value:
kwp<=50?price_medium.value:
price_large.value;

let base = kwp * price;
let yearly = kwp * specific_yield.value;

let usedNo = yearly * self_use_no_battery.value/100;
let saveNo = usedNo * price_kwh.value;

let usedBat = yearly * self_use_with_battery.value/100;
let saveBat = usedBat * price_kwh.value;

return {
kwp,price,base,yearly,
saveNo,saveBat,
payNo: base/saveNo,
payBat: (base+ +battery_price.value)/saveBat,
dynNo: dynamicPayback(base,saveNo,energy_growth.value),
dynBat: dynamicPayback(base+ +battery_price.value,saveBat,energy_growth.value),
profitNo: saveNo*25-base,
profitBat: saveBat*25-(base+ +battery_price.value)
};
}

function calc(){

let d = getData();

let better = d.payNo < d.payBat;

result.innerHTML = `
<div class="card ${better?'good':'bad'}">
❌ Без батерия<br>
Цена: ${d.base.toFixed(0)} €<br>
Възвръщаемост: ${d.payNo.toFixed(1)} г.<br>
Динамична: ${d.dynNo} г.<br>
Печалба: ${d.profitNo.toFixed(0)} €
</div>

<div class="card ${!better?'good':'bad'}">
🔋 С батерия<br>
Цена: ${(d.base + +battery_price.value).toFixed(0)} €<br>
Възвръщаемост: ${d.payBat.toFixed(1)} г.<br>
Динамична: ${d.dynBat} г.<br>
Печалба: ${d.profitBat.toFixed(0)} €
</div>
`;
}

function generatePDF() {
  const d = getData();

  const client = document.getElementById("client_name").value || "Клиент";
  const attention = document.getElementById("attention_name").value || client;
  const project = document.getElementById("project_name").value || "-";

  const today = new Date();
  const dateStr = today.toLocaleDateString("bg-BG");

  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  const randomPart = String(Math.floor(Math.random() * 900) + 100);

  const outNumber = `${randomPart}/${dateStr}`;
  const offerNumber = `BUG${yyyy}${mm}${dd}${randomPart}`;

  const useBatteryVariant = d.payBat <= d.payNo + 3 && d.profitBat >= d.profitNo;
  const selectedTotalNoVat = useBatteryVariant ? (d.base + (+battery_price.value || 0)) : d.base;
  const selectedTotalWithVat = selectedTotalNoVat * 1.20;
  const selectedVariantText = useBatteryVariant ? "С батерия" : "Без батерия";

  const logoSrc = "icon.png";

  const win = window.open("", "_blank");

  win.document.write(`

        margin-bottom:6px;

        font-size:11px;

      }

        height:50px;
      }
      
      .out-number {
        margin:6px 0 10px 0;
        font-size:13px;
      }
      
      .attention {
        margin-bottom:12px;
      }
      
      .title-block {
        text-align:center;
        margin-bottom:12px;
      }
      
      .title-block h1 {
        font-size:18px;
        margin:0 0 6px 0;
        letter-spacing:4px;
      }

        font-size:14px;

      }
      
      .offer-from {
        font-size:14px;
      }

        font-weight:bold;
      }

        margin:10px 0;
      }
      
      .price-line {
        font-size:16px;
        font-weight:bold;
      }
      
      .closing {
        margin-top:12px;
      }
      
      .sign-row {
        margin-top:20px;
        display:flex;
        justify-content:space-between;
      }

        display: block;
        margin-bottom: 4px;
      }

      .value {

      }

      .price-block {
        margin: 18px 0;
      }

        font-size: 18px;
        font-weight: 700;
      }

      .bank-block,
      .notes-block {
        margin-top: 10px;
      }

      .closing {
        margin-top: 26px;
      }

      .sign-row {
        margin-top: 42px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .sign-left, .sign-right {
        width: 40%;
      }

      .sign-right {
        text-align: left;
      }

      .muted {
        font-size: 12px;
      }

      .nowrap {
        white-space: nowrap;
      }
    </style>
  </head>
  <body>

    <div class="top-company">
      <div class="company-left">
        <div><strong>PTG Engineering Ltd.</strong></div>
        <div>Madara Street 23 Apr 10</div>
        <div>9010 Varna, Bulgaria</div>
        <div>office@ptg-engineering.com</div>
        <div>www.ptg-engineering.com</div>
      </div>
      <img src="${logoSrc}" class="company-logo" alt="PTG logo">
    </div>

    <div class="out-number">Изх.N: ${outNumber}</div>

    <div class="attention">На вниманието на: ${attention}</div>

    <div class="title-block">
      <h1>Б Ю Д Ж Е Т Н А&nbsp; О Ф Е Р Т А</h1>
      <div class="offer-no">№ ${offerNumber} / ${dateStr}</div>
      <div class="offer-from">От “ПИ ТИ ДЖИ ИНЖЕНЕРИНГ” ООД- ВАРНА</div>
    </div>

    <div class="paragraph">
      Уважаеми ${client},<br><br>
      Във връзка с Ваше запитване за изграждане на фотоволтаична система,
      за нас е удоволствие да Ви представим нашата бюджетна оферта, както следва:
    </div>

    <div class="section-row">
      <span class="label">Обект:</span>
      <div class="value">${project}</div>
    </div>

    <div class="section-row">
      <span class="label">Цел:</span>
      <div class="value">Изграждане на фотоволтаична система</div>
    </div>

    <div class="section-row">
      <span class="label">Срокове:</span>
      <div class="value">Ще бъдат уточнени в окончателната оферта</div>
    </div>

    <div class="section-row price-block">
      <span class="label">Стойност:</span>
      <div class="price-line">
        ОБЩА СУМА:
        ${selectedTotalNoVat.toFixed(2)} ЕВРО без ДДС /
        ${selectedTotalWithVat.toFixed(2)} ЕВРО с ДДС
      </div>
        Вариант: ${selectedVariantText} | Прогнозна мощност: ${d.kwp.toFixed(2)} kWp
      </div>
    </div>

    <div class="section-row">
      <span class="label">Начин на плащане:</span>
      <div class="value">
        50% авансово при поръчка, 50% след въвеждане на инсталацията в експлоатация
        и подписване на приемо-предавателен протокол
      </div>
    </div>

    <div class="section-row bank-block">
      <div>Банков път: Банка ДСК АД,</div>
      <div>IBAN Сметка лева: BG84STSA93000032207428,</div>
      <div>BIC: STSABGSF;</div>
    </div>

    <div class="section-row">
      <span class="label">Валидност на офертата:</span>
      <div class="value">30 календарни дни</div>
    </div>

    <div class="section-row">
     
    </div>

    <div class="section-row notes-block">
      <span class="label">Забележки:</span>
      <div class="value">
        Предложените суми са за оборудването доставено и монтирано DDP Варна
        (Incoterms 2015), опаковано, без начислен ДДС.
      </div>
    </div>

    <div class="closing">
      Искрено се надяваме, че нашата оферта ще удовлетвори Вашите условия!
    </div>

    <div class="sign-row">
      <div class="sign-left">
        ${dateStr} г.<br>
        гр. Варна
      </div>
      <div class="sign-right">
        С УВАЖЕНИЕ:<br><br>

      </div>
    </div>

  </body>
  </html>
  `);

  win.document.close();
  win.focus();

  setTimeout(() => {
    win.print();
  }, 700);
}
</script>

</body>
</html>

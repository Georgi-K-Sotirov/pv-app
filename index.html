<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PV Калкулатор</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#2e7d32">

<style>
body {font-family: Arial; background:#efefef; padding:12px;}
.container {max-width:600px;margin:auto;background:white;padding:16px;border-radius:12px;}

input, select {
width:100%;
padding:12px;
margin:6px 0 12px;
font-size:16px;
}

button {
width:100%;
padding:14px;
font-size:20px;
margin-top:10px;
border:none;
border-radius:10px;
color:white;
background:#2e7d32;
}

.blue {background:#1565c0;}

.card {
border:2px solid #ccc;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.good {border-color:green;background:#eef8ee;}
.bad {border-color:red;background:#fdeeee;}

.result {margin-top:15px;font-size:16px;}

</style>
</head>

<body>

<div class="container">

<h2>PV Калкулатор</h2>

<h3>Данни за оферта</h3>
<input id="client_name" placeholder="Клиент">
<input id="project_name" placeholder="Обект">

<h3>Покрив</h3>
<input id="area" value="35">
<input id="factor" value="0.75">
<input id="density" value="0.21">

<h3>Цени</h3>
<input id="price_small" value="1500">
<input id="price_medium" value="1100">
<input id="price_large" value="950">

<h3>Батерия</h3>
<input id="battery_price" value="5000">

<h3>Тип обект</h3>
<select id="object_type" onchange="updateObjectType()">
<option value="household">Битов</option>
<option value="industrial">Промишлен</option>
</select>

<input id="price_kwh" value="0.13">

<input id="specific_yield" value="1350">
<input id="self_use_no_battery" value="45">
<input id="self_use_with_battery" value="75">
<input id="energy_growth" value="3">

<button onclick="calc()">Смятай</button>
<button class="blue" onclick="generatePDF()">PDF оферта</button>

<div id="result" class="result"></div>

</div>

<script>

function updateObjectType(){
let type = object_type.value;
if(type==="household"){
price_kwh.value=0.13;
price_kwh.disabled=true;
}else{
price_kwh.value=0.22;
price_kwh.disabled=false;
}
}

function dynamicPayback(cost, saving, growth){
let cum=0;
let yearly=saving;
for(let y=1;y<=50;y++){
cum+=yearly;
if(cum>=cost) return y;
yearly*=1+(growth/100);
}
return 50;
}

function getData(){

let kwp = area.value * factor.value * density.value;

let price = kwp<=15?price_small.value:
kwp<=50?price_medium.value:
price_large.value;

let base = kwp * price;
let yearly = kwp * specific_yield.value;

let usedNo = yearly * self_use_no_battery.value/100;
let saveNo = usedNo * price_kwh.value;

let usedBat = yearly * self_use_with_battery.value/100;
let saveBat = usedBat * price_kwh.value;

return {
kwp,price,base,yearly,
saveNo,saveBat,
payNo: base/saveNo,
payBat: (base+ +battery_price.value)/saveBat,
dynNo: dynamicPayback(base,saveNo,energy_growth.value),
dynBat: dynamicPayback(base+ +battery_price.value,saveBat,energy_growth.value),
profitNo: saveNo*25-base,
profitBat: saveBat*25-(base+ +battery_price.value)
};
}

function calc(){

let d = getData();

let better = d.payNo < d.payBat;

result.innerHTML = `
<div class="card ${better?'good':'bad'}">
❌ Без батерия<br>
Цена: ${d.base.toFixed(0)} €<br>
Възвръщаемост: ${d.payNo.toFixed(1)} г.<br>
Динамична: ${d.dynNo} г.<br>
Печалба: ${d.profitNo.toFixed(0)} €
</div>

<div class="card ${!better?'good':'bad'}">
🔋 С батерия<br>
Цена: ${(d.base + +battery_price.value).toFixed(0)} €<br>
Възвръщаемост: ${d.payBat.toFixed(1)} г.<br>
Динамична: ${d.dynBat} г.<br>
Печалба: ${d.profitBat.toFixed(0)} €
</div>
`;
}

function generatePDF(){

let d = getData();

let client = client_name.value || "Клиент";
let project = project_name.value || "-";

let today = new Date();
let date = today.toLocaleDateString("bg-BG");

let offerNumber = "BUG" + today.getFullYear() +
String(today.getMonth()+1).padStart(2,'0') +
String(today.getDate()).padStart(2,'0') +
Math.floor(Math.random()*1000);

let priceNoVat = d.base;
let priceWithVat = priceNoVat * 1.2;

let win = window.open("","_blank");

win.document.write(`
<html>
<head>
<style>
body {
font-family: Arial;
margin: 40px;
color:#111;
line-height:1.5;
}

.header {
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #000;
padding-bottom:10px;
margin-bottom:20px;
}

.logo {
height:60px;
}

.title {
text-align:center;
margin:20px 0;
}

.section {
margin-top:18px;
}

.bold {font-weight:bold;}

.box {
margin-top:20px;
padding:15px;
border:2px solid #000;
font-size:18px;
}

.footer {
margin-top:50px;
display:flex;
justify-content:space-between;
}

.small {
font-size:13px;
color:#444;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<div>
<b>ПИ ТИ ДЖИ ИНЖЕНЕРИНГ ООД</b><br>
гр. Варна
</div>

<img src="icon.png" class="logo">
</div>

<div style="text-align:right">
Изх.N: ${offerNumber}
</div>

<div class="section">
На вниманието на: ${client}
</div>

<div class="title">
<h2>БЮДЖЕТНА ОФЕРТА</h2>
<div>№ ${offerNumber} / ${date}</div>
</div>

<div class="section">
Уважаеми ${client},<br><br>
Във връзка с Ваше запитване за изграждане на фотоволтаична система,
имаме удоволствието да Ви представим нашата оферта:
</div>

<div class="section">
<b>Обект:</b> ${project}<br><br>

<b>Цел:</b> Изграждане на фотоволтаична система<br><br>

<b>Инсталирана мощност:</b> ${d.kwp.toFixed(2)} kWp<br><br>

<b>Срокове:</b> Ще бъдат уточнени в окончателната оферта
</div>

<div class="box">
ОБЩА СУМА:<br><br>

${priceNoVat.toFixed(2)} € без ДДС<br>
${priceWithVat.toFixed(2)} € с ДДС
</div>

<div class="section">
<b>Начин на плащане:</b><br>
50% авансово при поръчка, 50% след въвеждане в експлоатация
</div>

<div class="section">
<b>Банка:</b> Банка ДСК<br>
IBAN: BG84STSA93000032207428<br>
BIC: STSABGSF
</div>

<div class="section">
<b>Валидност:</b> 30 календарни дни
</div>

<div class="small">
Предложената цена е ориентировъчна и подлежи на уточнение след оглед.
</div>

<div class="footer">
<div>
${date}<br><br>
инж. Георги Сотиров<br>
Управител
</div>

<div>
С УВАЖЕНИЕ
</div>
</div>

</body>
</html>
`);

win.document.close();

setTimeout(()=>{
win.print();
},500);
}
</script>

</body>
</html>

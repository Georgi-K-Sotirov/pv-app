<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PV Калкулатор</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#2e7d32">

<style>
body {font-family: Arial; background:#efefef; padding:12px;}
.container {max-width:600px;margin:auto;background:white;padding:16px;border-radius:12px;}

input, select {
width:100%;
padding:12px;
margin:6px 0 12px;
font-size:16px;
}

button {
width:100%;
padding:14px;
font-size:20px;
margin-top:10px;
border:none;
border-radius:10px;
color:white;
background:#2e7d32;
}

.blue {background:#1565c0;}

.card {
border:2px solid #ccc;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.good {border-color:green;background:#eef8ee;}
.bad {border-color:red;background:#fdeeee;}

.result {margin-top:15px;font-size:16px;}

</style>
</head>

<body>

<div class="container">

<h2>PV Калкулатор</h2>

<h3>Данни за оферта</h3>

<label>Обръщение</label>
<select id="salutation">
  <option value="mr">г-н</option>
  <option value="mrs">г-жа</option>
  <option value="neutral">г-н/г-жа</option>
  <option value="none">без обръщение</option>
</select>

<label>Клиент</label>
<input id="client_name" placeholder="Име на клиент">

<label>Обект</label>
<input id="project_name" placeholder="Адрес / обект">

<label>Вариант за оферта</label>
<select id="offer_variant">
  <option value="auto">Автоматично</option>
  <option value="no_battery">Без батерия</option>
  <option value="with_battery">С батерия</option>
</select>

<h3>Покрив</h3>
<label>Площ (m²)</label>
<input id="area" value="35">
<label>Използваемост (%)</label>
<input id="factor" value="0.75">
<label>Плътност (kWp/m²)</label>
<input id="density" value="0.21">

<h3>Цени</h3>
<label>Цена до 15 kWp (€/kWp)</label>
<input id="price_small" value="1500">
<label>Цена до 50 kWp (€/kWp)</label>
<input id="price_medium" value="1100">
<label>Цена над 50 kWp (€/kWp)</label>
<input id="price_large" value="950">

<h3>Батерия</h3>

<label>Режим на батерия</label>
<select id="battery_mode" onchange="toggleBatteryMode()">
  <option value="auto">Автоматично по мощност</option>
  <option value="manual">Ръчно</option>
  <option value="none">Без батерия</option>
</select>

<label>Коефициент батерия спрямо мощност</label>
<input id="battery_ratio" value="0.5">

<label>Ръчен капацитет батерия (kWh)</label>
<input id="battery_kwh_manual" value="5.12">

<label>Цена на батерия (€/kWh)</label>
<input id="battery_price_per_kwh" value="420">

<h3>Тип обект</h3>
<label>Тип клиент</label>
<select id="object_type" onchange="updateObjectType()">
<option value="household">Битов</option>
<option value="industrial">Промишлен</option>
</select>
<label>Цена на ток (€/kWh)</label>
<input id="price_kwh" value="0.13">

<label>Специфично производство (kWh/kWp)</label>
<input id="specific_yield" value="1350">
<label>Самопотребление без батерия (%)</label>
<input id="self_use_no_battery" value="45">
<label>Самопотребление с батерия (%)</label>
<input id="self_use_with_battery" value="75">
<label>Годишно поскъпване на тока (%)</label>
<input id="energy_growth" value="3">

<button onclick="calc()">Смятай</button>
<button class="blue" onclick="generatePDF()">PDF оферта</button>

<div id="result" class="result"></div>

</div>

<script>

function toggleBatteryMode() {
  const mode = document.getElementById("battery_mode").value;
  const ratio = document.getElementById("battery_ratio");
  const manual = document.getElementById("battery_kwh_manual");

  if (mode === "auto") {
    ratio.disabled = false;
    manual.disabled = true;
  } else if (mode === "manual") {
    ratio.disabled = true;
    manual.disabled = false;
  } else {
    ratio.disabled = true;
    manual.disabled = true;
  }
}

function updateObjectType(){
let type = object_type.value;
if(type==="household"){
price_kwh.value=0.13;
price_kwh.disabled=true;
}else{
price_kwh.value=0.22;
price_kwh.disabled=false;
}
}

function dynamicPayback(cost, saving, growth){
let cum=0;
let yearly=saving;
for(let y=1;y<=50;y++){
cum+=yearly;
if(cum>=cost) return y;
yearly*=1+(growth/100);
}
return 50;
}

function getData() {
  let kwp = area.value * factor.value * density.value;

  let price = kwp <= 15 ? price_small.value :
              kwp <= 50 ? price_medium.value :
              price_large.value;

  let base = kwp * price;
  let yearly = kwp * specific_yield.value;

  const batteryMode = document.getElementById("battery_mode").value;
  const batteryRatio = parseFloat(document.getElementById("battery_ratio").value) || 0;
  const batteryManual = parseFloat(document.getElementById("battery_kwh_manual").value) || 0;
  const batteryPricePerKwh = parseFloat(document.getElementById("battery_price_per_kwh").value) || 0;

  let batteryKwh = 0;

  if (batteryMode === "auto") {
    batteryKwh = kwp * batteryRatio;

    // закръгляне към реални модули 5.12 kWh
    batteryKwh = Math.ceil(batteryKwh / 5.12) * 5.12;
  } else if (batteryMode === "manual") {
    batteryKwh = batteryManual;
  } else {
    batteryKwh = 0;
  }

  let batteryTotal = batteryKwh * batteryPricePerKwh;

  let usedNo = yearly * self_use_no_battery.value / 100;
  let saveNo = usedNo * price_kwh.value;

  let usedBat = yearly * self_use_with_battery.value / 100;
  let saveBat = usedBat * price_kwh.value;

  return {
    kwp,
    price,
    base,
    yearly,
    batteryKwh,
    batteryTotal,
    saveNo,
    saveBat,
    payNo: base / saveNo,
    payBat: (base + batteryTotal) / saveBat,
    dynNo: dynamicPayback(base, saveNo, energy_growth.value),
    dynBat: dynamicPayback(base + batteryTotal, saveBat, energy_growth.value),
    profitNo: saveNo * 25 - base,
    profitBat: saveBat * 25 - (base + batteryTotal)
  };
}

function calc() {
  const d = getData();

  const noBatBetter = d.payNo <= d.payBat;
  const withBatBetter = !noBatBetter;

  let recommendation = "";
  if (d.payNo + 3 < d.payBat) {
    recommendation = "Препоръчано решение: БЕЗ батерия – по-добра възвръщаемост.";
  } else if (d.profitBat > d.profitNo && d.payBat <= d.payNo + 3) {
    recommendation = "Препоръчано решение: С батерия – по-висока дългосрочна печалба и по-добро самопотребление.";
  } else {
    recommendation = "Препоръчано решение: БЕЗ батерия – по-балансиран вариант към момента.";
  }

  const dynamicNoText = d.dynNo >= 50 ? ">50 години" : `${d.dynNo} г.`;
  const dynamicBatText = d.dynBat >= 50 ? ">50 години" : `${d.dynBat} г.`;

  const yearlyProduction = d.yearly;
  const usedNo = yearlyProduction * (parseFloat(self_use_no_battery.value) / 100);
  const usedBat = yearlyProduction * (parseFloat(self_use_with_battery.value) / 100);

  result.innerHTML = `
    <div style="margin-bottom:10px;">
      <strong>Мощност:</strong> ${d.kwp.toFixed(2)} kWp<br>
      <strong>Категория:</strong> ${
        d.kwp <= 15 ? "Малка система" : d.kwp <= 50 ? "Средна система" : "Голяма система"
      }<br>
      <strong>Цена на категория:</strong> ${Number(d.price).toFixed(0)} €/kWp<br>
      <strong>Базова цена на системата:</strong> ${d.base.toFixed(0)} €<br>
      <strong>Годишно производство:</strong> ${yearlyProduction.toFixed(0)} kWh<br>
      <strong>Цена на тока:</strong> ${parseFloat(price_kwh.value).toFixed(2)} €/kWh<br>
      <strong>Годишно поскъпване на тока:</strong> ${parseFloat(energy_growth.value).toFixed(1)} %
    </div>

    <div class="card ${noBatBetter ? 'good' : 'bad'}">
      <div><strong>❌ Без батерия</strong></div>
      <div>Цена: ${d.base.toFixed(0)} €</div>
      <div>Самопотребление: ${parseFloat(self_use_no_battery.value).toFixed(0)} %</div>
      <div>Оползотворена енергия: ${usedNo.toFixed(0)} kWh</div>
      <div>Годишна икономия: ${d.saveNo.toFixed(0)} €</div>
      <div>Опростена възвръщаемост: ${d.payNo.toFixed(1)} години</div>
      <div>Динамична възвръщаемост: ${dynamicNoText}</div>
      <div>Печалба за 25 години: ${d.profitNo.toFixed(0)} €</div>
    </div>

    <div class="card ${withBatBetter ? 'good' : 'bad'}">
      <div><strong>🔋 С батерия</strong></div>
      <div>Капацитет батерия: ${d.batteryKwh.toFixed(2)} kWh</div>
      <div>Цена на батерия: ${d.batteryTotal.toFixed(0)} €</div>
      <div>Цена: ${(d.base + d.batteryTotal).toFixed(0)} €</div>
      <div>Самопотребление: ${parseFloat(self_use_with_battery.value).toFixed(0)} %</div>
      <div>Оползотворена енергия: ${usedBat.toFixed(0)} kWh</div>
      <div>Годишна икономия: ${d.saveBat.toFixed(0)} €</div>
      <div>Опростена възвръщаемост: ${d.payBat.toFixed(1)} години</div>
      <div>Динамична възвръщаемост: ${dynamicBatText}</div>
      <div>Печалба за 25 години: ${d.profitBat.toFixed(0)} €</div>
    </div>
    

    <div class="card good">
      <strong>${recommendation}</strong>
    </div>
  `;
}

function generatePDF() {
  const d = getData();

  const client = document.getElementById("client_name").value || "Клиент";
  const project = document.getElementById("project_name").value || "-";
  const salutation = document.getElementById("salutation").value;
  const offerVariant = document.getElementById("offer_variant").value;

  let attention = client;
  let greeting = "";
  let attentionLabel = "";

  if (salutation === "mr") {
    attentionLabel = `г-н ${client}`;
    greeting = `Уважаеми г-н ${client},`;
  } else if (salutation === "mrs") {
    attentionLabel = `г-жа ${client}`;
    greeting = `Уважаема г-жо ${client},`;
  } else if (salutation === "neutral") {
    attentionLabel = client;
    greeting = `Уважаеми/а ${client},`;
  } else {
    attentionLabel = client;
    greeting = `Уважаеми клиенти,`;
  }

  const today = new Date();
  const dateStr = today.toLocaleDateString("bg-BG");

  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  const randomPart = String(Math.floor(Math.random() * 900) + 100);

  const outNumber = `${randomPart}/${dateStr}`;
  const offerNumber = `BUG${yyyy}${mm}${dd}${randomPart}`;

  let useBatteryVariant = false;

  if (offerVariant === "with_battery") {
    useBatteryVariant = true;
  } else if (offerVariant === "no_battery") {
    useBatteryVariant = false;
  } else {
    useBatteryVariant = d.payBat <= d.payNo + 3 && d.profitBat >= d.profitNo;
  }

  const selectedTotalNoVat = useBatteryVariant
    ? (d.base + d.batteryTotal)
    : d.base;

  const selectedTotalWithVat = selectedTotalNoVat * 1.20;
  const selectedVariantText = useBatteryVariant ? "С батерия" : "Без батерия";

  const logoSrc = "icon.png";

  const win = window.open("", "_blank");

  win.document.write(`
  <html lang="bg">
  <head>
    <meta charset="UTF-8">
    <title>Бюджетна оферта</title>
    <style>
      @page {
        size: A4;
        margin: 12mm 12mm;
      }
      
      body {
        font-family: Arial;

        line-height: 1.3;
      }
      
      .top-company {
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        margin-bottom:6px;
      }
      
      .company-left {
        font-size:11px;
        line-height:1.2;
      }
      
      .company-logo {
        height:50px;
      }
      
      .out-number {
        margin:6px 0 10px 0;
        font-size:13px;
      }
      
      .attention {
        margin-bottom:12px;
      }
      
      .title-block {
        text-align:center;
        margin-bottom:12px;
      }
      
      .title-block h1 {
        font-size:18px;
        margin:0 0 6px 0;
        letter-spacing:4px;
      }
      
      .offer-no {
        font-size:14px;
        margin-bottom:4px;
      }
      
      .offer-from {
        font-size:14px;
      }
      
      .paragraph {
        margin-bottom:10px;
      }
      
      .section-row {
        margin-bottom:8px;
      }
      
      .label {
        font-weight:bold;
      }
      
      .price-block {
        margin:10px 0;
      }
      
      .price-line {
        font-size:16px;
        font-weight:bold;
      }
      
      .closing {
        margin-top:12px;
      }
      
      .sign-row {
        margin-top:20px;
        display:flex;
        justify-content:space-between;
      }

      .label {
        font-weight: 700;
        display: block;
        margin-bottom: 4px;
      }

      .value {
        padding-left: 0;
      }

      .price-block {
        margin: 18px 0;
      }

      .price-line {
        font-size: 18px;
        font-weight: 700;
      }

      .bank-block,
      .notes-block {
        margin-top: 10px;
      }

      .closing {
        margin-top: 26px;
      }

      .sign-row {
        margin-top: 42px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .sign-left, .sign-right {
        width: 40%;
      }

      .sign-right {
        text-align: left;
      }

      .muted {
        font-size: 12px;
      }

      .nowrap {
        white-space: nowrap;
      }
    </style>
  </head>
  <body>

    <div class="top-company">
      <div class="company-left">
        <div><strong>PTG Engineering Ltd.</strong></div>
        <div>Madara Street 23 Apr 10</div>
        <div>9010 Varna, Bulgaria</div>
        <div>office@ptg-engineering.com</div>
        <div>www.ptg-engineering.com</div>
      </div>
      <img src="${logoSrc}" class="company-logo" alt="PTG logo">
    </div>

    <div class="out-number">Изх.N: ${outNumber}</div>

    <div class="attention">На вниманието на: ${attentionLabel}</div>

    <div class="title-block">
      <h1>Б Ю Д Ж Е Т Н А&nbsp; О Ф Е Р Т А</h1>
      <div class="offer-no">№ ${offerNumber} / ${dateStr}</div>
      <div class="offer-from">От “ПИ ТИ ДЖИ ИНЖЕНЕРИНГ” ООД- ВАРНА</div>
    </div>

    <div class="paragraph">
      ${greeting}<br><br>
      Във връзка с Ваше запитване за изграждане на фотоволтаична система,
      за нас е удоволствие да Ви представим нашата бюджетна оферта, както следва:
    </div>

    <div class="section-row">
      <span class="label">Обект:</span>
      <div class="value">${project}</div>
    </div>

    <div class="section-row">
      <span class="label">Цел:</span>
      <div class="value">Изграждане на фотоволтаична система</div>
    </div>

    <div class="section-row">
      <span class="label">Срокове:</span>
      <div class="value">Ще бъдат уточнени в окончателната оферта</div>
    </div>

     <div class="section-row price-block">
      <span class="label">Стойност:</span>
      <div class="price-line">
        ОБЩА СУМА:
        ${selectedTotalNoVat.toFixed(2)} ЕВРО без ДДС /
        ${selectedTotalWithVat.toFixed(2)} ЕВРО с ДДС
      </div>
      <div class="muted">
        Вариант: ${selectedVariantText} |
        Прогнозна мощност: ${d.kwp.toFixed(2)} kWp
        ${useBatteryVariant ? `| Батерия: ${d.batteryKwh.toFixed(2)} kWh` : ""}
      </div>
    </div>

    <div class="section-row">
      <span class="label">Начин на плащане:</span>
      <div class="value">
        50% авансово при поръчка, 50% след въвеждане на инсталацията в експлоатация
        и подписване на приемо-предавателен протокол
      </div>
    </div>

    <div class="section-row bank-block">
      <div>Банков път: Банка ДСК АД,</div>
      <div>IBAN Сметка лева: BG84STSA93000032207428,</div>
      <div>BIC: STSABGSF;</div>
    </div>

    <div class="section-row">
      <span class="label">Валидност на офертата:</span>
      <div class="value">30 календарни дни</div>
    </div>

    <div class="section-row">
     
    </div>

    <div class="section-row notes-block">
      <span class="label">Забележки:</span>
      <div class="value">
        Предложените суми са за оборудването доставено и монтирано DDP Варна
        (Incoterms 2015), опаковано, без начислен ДДС.
      </div>
    </div>

    <div class="closing">
      Искрено се надяваме, че нашата оферта ще удовлетвори Вашите условия!
    </div>

    <div class="sign-row">
      <div class="sign-left">
        ${dateStr} г.<br>
        гр. Варна
      </div>
      <div class="sign-right">
        С УВАЖЕНИЕ:<br><br>
        инж. Георги Сотиров<br>
        Управител
      </div>
    </div>

  </body>
  </html>
  `);

  win.document.close();
  win.focus();

  setTimeout(() => {
    win.print();
  }, 700);
}
</script>

</body>
</html>
